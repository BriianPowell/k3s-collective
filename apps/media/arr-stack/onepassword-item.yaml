#
# Syncs 1Password item → Secret "arr-stack" in media namespace.
# Shared credentials for exportarr exporters and Recyclarr.
#
# Field labels must match secret keys exactly:
#   API keys — secretKeyRef in apps/media/*/exporter.yaml
#   secrets.yml — Recyclarr file (multiline YAML), copied to /config/secrets.yml on start
# https://developer.1password.com/docs/k8s/operator
#
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: arr-stack
  namespace: media
  labels:
    app.kubernetes.io/component: secrets
    app.kubernetes.io/name: arr-stack
    app.kubernetes.io/part-of: arr-stack
spec:
  itemPath: vaults/Collective/items/Arr Stack
