apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sonarr-tv-dashboard-https
  namespace: media
  labels:
    app.kubernetes.io/component: ingress
    app.kubernetes.io/name: sonarr-tv
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`sonarr-tv.powell.place`)
      middlewares:
        - name: security
          namespace: kube-system
      services:
        - name: sonarr-tv
          port: http
