#
# Syncs 1Password item → Secret "deluge" in media namespace.
# Field labels in 1Password must be exactly: VPN_USER, VPN_PASS, APP_PASS
# https://developer.1password.com/docs/k8s/operator
#
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: deluge
  namespace: media
  labels:
    app.kubernetes.io/component: secrets
    app.kubernetes.io/name: deluge
    app.kubernetes.io/part-of: deluge
spec:
  itemPath: vaults/Collective/items/Deluge
