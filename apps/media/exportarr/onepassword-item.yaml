#
# Syncs 1Password item → Secret "exportarr" in media namespace.
# Field labels must match secretKeyRef keys in apps/media/*/exporter.yaml.
# https://developer.1password.com/docs/k8s/operator
#
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: exportarr
  namespace: media
  labels:
    app.kubernetes.io/component: secrets
    app.kubernetes.io/name: exportarr
    app.kubernetes.io/part-of: exportarr
spec:
  itemPath: vaults/Collective/items/Exportarr
