#
# Syncs 1Password item → Secret "grafana" in monitoring namespace.
# Field labels must match keys referenced by Helm (admin + envFromSecrets + grafana.ini $__env{}).
# https://developer.1password.com/docs/k8s/operator
#
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/component: secrets
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: grafana
spec:
  itemPath: vaults/Collective/items/Grafana
