#
# SMTP app password only. Config lives in alertmanager.yaml (git).
# Login item: password field syncs to Secret key "password" (mounted as smtp_auth_password)
# https://developer.1password.com/docs/k8s/operator
#
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: alertmanager-smtp
  namespace: monitoring
  labels:
    app.kubernetes.io/component: secrets
    app.kubernetes.io/name: alertmanager-smtp
    app.kubernetes.io/part-of: alert-manager
spec:
  itemPath: vaults/Collective/items/SMTP
