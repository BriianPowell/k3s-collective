#
# Home Assistant long-lived access token for /api/prometheus scrapes.
# Same 1Password item as apps/base/homeassistant; field label must be: token
# https://developer.1password.com/docs/k8s/operator
#
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/component: secrets
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: prometheus
spec:
  itemPath: vaults/Collective/items/Home Assistant
