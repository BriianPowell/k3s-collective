apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sonarr-anime
  namespace: monitoring
  labels:
    app.kubernetes.io/component: service-monitor
    app.kubernetes.io/name: sonarr-anime
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: service
      app.kubernetes.io/name: sonarr-anime-exportarr
  namespaceSelector:
    matchNames:
      - media
  endpoints:
    - interval: 4m
      port: metrics
      scrapeTimeout: 90s
      path: /metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sonarr-tv
  namespace: monitoring
  labels:
    app.kubernetes.io/component: service-monitor
    app.kubernetes.io/name: sonarr-tv
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: service
      app.kubernetes.io/name: sonarr-tv-exportarr
  namespaceSelector:
    matchNames:
      - media
  endpoints:
    - interval: 4m
      port: metrics
      scrapeTimeout: 90s
      path: /metrics
