#
# Referencens:
# https://grafana.com/docs/loki/latest/operations/storage/schema/
# https://github.com/grafana/loki/blob/main/production/helm/loki/Chart.yaml
#

apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
  labels:
    app.kubernetes.io/component: helm-release
    app.kubernetes.io/name: loki
spec:
  interval: 24h0m0s
  maxHistory: 3
  timeout: 15m0s
  chart:
    spec:
      chart: loki
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
      version: '>=6.0.0 <7.0.0'
  values:
    nameOverride: null
    fullnameOverride: null
    clusterLabelOverride: null
    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: '2024-05-05'
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
      ingester:
        chunk_encoding: snappy
      querier:
        max_concurrent: 1
      tracing:
        enabled: false
      # Debug-only logs: 3d retention on 10Gi PVC. Compactor runs in single-binary (targetModule: all).
      limits_config:
        retention_period: 72h
        max_query_lookback: 72h
        reject_old_samples: true
        reject_old_samples_max_age: 72h
        ingestion_rate_mb: 8
        ingestion_burst_size_mb: 16
        max_line_size: 256kb
      compactor:
        working_directory: /var/loki/compactor
        compaction_interval: 30m
        retention_enabled: true
        retention_delete_delay: 2h
        delete_request_store: filesystem
    deploymentMode: SingleBinary
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        # Must match existing volumeClaimTemplates (10Gi). K8s forbids resizing via StatefulSet patch.
        # To grow: patch PVC manually if storage class allows, or enable enableStatefulSetRecreationForSizeChange.
        size: 10Gi
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 2
          memory: 2Gi
      extraEnv:
        - name: GOMEMLIMIT
          value: 1800MiB
      nodeSelector:
        kubernetes.io/hostname: abaddon
    chunksCache:
      # Optional query speedup; not needed for occasional Grafana debug queries.
      enabled: false
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    ingester:
      replicas: 0
    querier:
      replicas: 0
    queryFrontend:
      replicas: 0
    queryScheduler:
      replicas: 0
    distributor:
      replicas: 0
    compactor:
      replicas: 0
    indexGateway:
      replicas: 0
    bloomCompactor:
      replicas: 0
    bloomGateway:
      replicas: 0
    resultsCache:
      enabled: false
    gateway:
      enabled: true
      replicas: 1
      nodeSelector:
        kubernetes.io/hostname: abaddon
    minio:
      enabled: false
    test:
      enabled: false
