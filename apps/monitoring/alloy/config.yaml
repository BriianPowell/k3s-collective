#
# Alloy → Loki (debug-oriented). Query logs only via Grafana.
# Namespace allowlist + relabel drops replace per-app discovery blocks.
#

apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy
  namespace: monitoring
  labels:
    app.kubernetes.io/component: config
    app.kubernetes.io/name: alloy
data:
  config.content: |
    // Workloads worth logs when something breaks (edit list as needed).
    discovery.kubernetes "apps" {
      role = "pod"

      namespaces {
        names = [
          "adguard",
          "atuin",
          "cert-manager",
          "cnpg-system",
          "crowdsec",
          "flux-system",
          "homeassistant",
          "keycloak",
          "media",
          "nextcloud",
          "wiki",
        ]
      }
    }

    discovery.relabel "apps" {
      targets = discovery.kubernetes.apps.targets

      // Finished jobs — no debugging value.
      rule {
        source_labels = ["__meta_kubernetes_pod_phase"]
        regex         = "Succeeded|Failed"
        action        = "drop"
      }

      // Sidecar / metrics containers (exportarr, postgres-exporter, etc.).
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        regex         = ".*(exporter|metrics|memcached).*"
        action        = "drop"
      }
    }

    loki.source.kubernetes "apps" {
      targets    = discovery.relabel.apps.output
      forward_to = [loki.write.local.receiver]
    }

    // kube-system: ingress + DNS + ntfy only (not every system pod).
    discovery.kubernetes "traefik" {
      role = "pod"

      namespaces {
        names = ["kube-system"]
      }

      selectors {
        role  = "pod"
        label = "app.kubernetes.io/name=traefik"
      }
    }

    discovery.kubernetes "ntfy" {
      role = "pod"

      namespaces {
        names = ["kube-system"]
      }

      selectors {
        role  = "pod"
        label = "app.kubernetes.io/name=ntfy"
      }
    }

    discovery.kubernetes "coredns" {
      role = "pod"

      namespaces {
        names = ["kube-system"]
      }

      selectors {
        role  = "pod"
        label = "k8s-app=kube-dns"
      }
    }

    loki.source.kubernetes "kube_system" {
      targets = array.concat(
        discovery.kubernetes.traefik.targets,
        discovery.kubernetes.ntfy.targets,
        discovery.kubernetes.coredns.targets,
      )
      forward_to = [loki.write.local.receiver]
    }

    loki.write "local" {
      endpoint {
        url = "http://loki.monitoring:3100/loki/api/v1/push"
      }
    }

    logging {
      level  = "info"
      format = "logfmt"
    }
