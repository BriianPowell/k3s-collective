#
# Syncs 1Password item → Secret "valheim" in valheim namespace.
# Field label in 1Password must be exactly: password
# https://developer.1password.com/docs/k8s/operator
#
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: valheim
  namespace: valheim
  labels:
    app.kubernetes.io/component: secrets
    app.kubernetes.io/name: valheim
    app.kubernetes.io/part-of: valheim
spec:
  itemPath: vaults/Collective/items/Games
