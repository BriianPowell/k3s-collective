#
# Syncs 1Password item → Secret "v-rising" in v-rising namespace.
# Field label in 1Password must be exactly: password
# https://developer.1password.com/docs/k8s/operator
#
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: v-rising
  namespace: v-rising
  labels:
    app.kubernetes.io/component: secrets
    app.kubernetes.io/name: v-rising
    app.kubernetes.io/part-of: v-rising
spec:
  itemPath: vaults/Collective/items/Games
