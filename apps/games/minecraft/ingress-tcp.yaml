# Minecraft TCP via Traefik LB (10.0.2.10). Forward :25565 to Traefik, not NodePort.
# Service name from release minecraft-server — verify: kubectl get svc -n minecraft
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: minecraft
  namespace: minecraft
  labels:
    app.kubernetes.io/component: ingress
    app.kubernetes.io/name: minecraft
spec:
  entryPoints:
    - minecraft
  routes:
    - match: HostSNI(`*`)
      services:
        - name: minecraft-server
          port: 25565
