#
# Syncs 1Password item → Secret "nextcloud" in nextcloud namespace.
# Field labels must match secretKeyRef keys in deployment.yaml and exporter.yaml.
# https://developer.1password.com/docs/k8s/operator
#
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: nextcloud
  namespace: nextcloud
  labels:
    app.kubernetes.io/component: secrets
    app.kubernetes.io/name: nextcloud
    app.kubernetes.io/part-of: nextcloud
spec:
  itemPath: vaults/Collective/items/Nextcloud
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: nextcloud-smtp
  namespace: nextcloud
  labels:
    app.kubernetes.io/component: secrets
    app.kubernetes.io/name: nextcloud-smtp
    app.kubernetes.io/part-of: nextcloud-smtp
spec:
  itemPath: vaults/Collective/items/SMTP Secondary
