#
# Syncs 1Password item → Secret "keycloak" in keycloak namespace.
# Field labels must match secretKeyRef keys in deployment.yaml.
# https://developer.1password.com/docs/k8s/operator
#
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app.kubernetes.io/component: secrets
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: keycloak
spec:
  itemPath: vaults/Collective/items/Keycloak
