# MQTT over TLS (Traefik terminates TLS → Mosquitto :1883). Do not expose plain 1883 on WAN.
#
# - :8883 (mqtts): optional; some networks block non-443 outbound (e.g. corp VPN).
# - :443 (websecure): use for VPN-restricted clients; SNI mqtt.powell.place (443 already forwarded).
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: mosquitto-mqtts
  namespace: homeassistant
  labels:
    app.kubernetes.io/component: ingress
    app.kubernetes.io/name: mosquitto-mqtts
spec:
  entryPoints:
    - mqtts
  routes:
    - match: HostSNI(`mqtt.powell.place`)
      services:
        - name: mosquitto
          port: 1883
  tls:
    secretName: wildcard-powell-place
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: mosquitto-mqtts-443
  namespace: homeassistant
  labels:
    app.kubernetes.io/component: ingress
    app.kubernetes.io/name: mosquitto-mqtts-443
spec:
  entryPoints:
    - websecure
  routes:
    - match: HostSNI(`mqtt.powell.place`)
      services:
        - name: mosquitto
          port: 1883
  tls:
    secretName: wildcard-powell-place
