# MQTT via Traefik TCP (node :1883 / :8883 / :443 → Mosquitto ClusterIP :1883). Mosquitto has no hostNetwork.
#
# - :1883 (mqtt): plain MQTT for LAN; do not forward on WAN.
# - :8883 (mqtts): TLS; optional WAN (some networks block non-443 outbound).
# - :443 (websecure): TLS + SNI mqtt.powell.place (VPN / restrictive egress).
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: mosquitto-mqtt-lan
  namespace: homeassistant
  labels:
    app.kubernetes.io/component: ingress
    app.kubernetes.io/name: mosquitto-mqtt-lan
spec:
  entryPoints:
    - mqtt
  routes:
    - match: HostSNI(`*`)
      services:
        - name: mosquitto
          port: 1883
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: mosquitto-mqtts
  namespace: homeassistant
  labels:
    app.kubernetes.io/component: ingress
    app.kubernetes.io/name: mosquitto-mqtts
spec:
  entryPoints:
    - mqtts
  routes:
    - match: HostSNI(`mqtt.powell.place`)
      services:
        - name: mosquitto
          port: 1883
  tls:
    secretName: wildcard-powell-place
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: mosquitto-mqtts-443
  namespace: homeassistant
  labels:
    app.kubernetes.io/component: ingress
    app.kubernetes.io/name: mosquitto-mqtts-443
spec:
  entryPoints:
    - websecure
  routes:
    - match: HostSNI(`mqtt.powell.place`)
      services:
        - name: mosquitto
          port: 1883
  tls:
    secretName: wildcard-powell-place
