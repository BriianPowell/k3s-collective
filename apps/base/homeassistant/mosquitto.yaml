apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto
  namespace: homeassistant
  labels:
    app.kubernetes.io/component: config
    app.kubernetes.io/name: mosquitto
data:
  mosquitto.conf: |
    listener 1883
    allow_anonymous false
    password_file /mosquitto/config/passwd
    persistence true
    persistence_location /mosquitto/data/
    log_dest stdout
---
apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: homeassistant
  labels:
    app.kubernetes.io/component: service
    app.kubernetes.io/name: mosquitto
spec:
  type: NodePort
  externalTrafficPolicy: Local
  selector:
    app.kubernetes.io/component: broker
    app.kubernetes.io/name: mosquitto
  ports:
    - name: mqtt
      port: 1883
      targetPort: mqtt
      nodePort: 31883
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: homeassistant
  labels:
    app.kubernetes.io/component: broker
    app.kubernetes.io/name: mosquitto
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: broker
      app.kubernetes.io/name: mosquitto
  template:
    metadata:
      labels:
        app.kubernetes.io/component: broker
        app.kubernetes.io/name: mosquitto
    spec:
      nodeSelector:
        kubernetes.io/hostname: abaddon
      initContainers:
        - name: init-config
          image: docker.io/library/eclipse-mosquitto:2.0.22 # {"$imagepolicy": "homeassistant:mosquitto"}
          command:
            - /bin/sh
            - -c
            - |
              cp /config-template/mosquitto.conf /mosquitto/config/mosquitto.conf
              mosquitto_passwd -b -c /mosquitto/config/passwd "$MQTT_USERNAME" "$MQTT_PASSWORD"
          env:
            - name: MQTT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: homeassistant
                  key: mqtt-username
            - name: MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homeassistant
                  key: mqtt-password
          volumeMounts:
            - name: config-template
              mountPath: /config-template
              readOnly: true
            - name: config
              mountPath: /mosquitto/config
      containers:
        - name: mosquitto
          image: docker.io/library/eclipse-mosquitto:2.0.22 # {"$imagepolicy": "homeassistant:mosquitto"}
          imagePullPolicy: Always
          ports:
            - name: mqtt
              containerPort: 1883
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /mosquitto/config
            - name: mosquitto-data
              mountPath: /mosquitto/data
      volumes:
        - name: config-template
          configMap:
            name: mosquitto
        - name: config
          emptyDir: {}
        - name: mosquitto-data
          persistentVolumeClaim:
            claimName: mosquitto-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mosquitto-pvc
  namespace: homeassistant
  labels:
    type: local
    app.kubernetes.io/component: storage-volume-claim
    app.kubernetes.io/name: mosquitto-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mosquitto-pv
  namespace: homeassistant
  labels:
    type: local
    app.kubernetes.io/component: storage-volume
    app.kubernetes.io/name: mosquitto-pv
spec:
  capacity:
    storage: 100Mi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  claimRef:
    name: mosquitto-pvc
    namespace: homeassistant
  local:
    path: /data/homeassistant/mosquitto
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - abaddon
