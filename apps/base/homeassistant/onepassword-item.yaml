#
# Syncs 1Password item → Secret "homeassistant" in homeassistant namespace.
# Field labels in 1Password must be exactly:
#   secrets.yaml — full HA secrets file (plain YAML, no ``` fences), copied to /config on start
#   token — long-lived access token (also synced to monitoring/prometheus for Prometheus scrapes)
# https://developer.1password.com/docs/k8s/operator
#
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: homeassistant
  namespace: homeassistant
  labels:
    app.kubernetes.io/component: secrets
    app.kubernetes.io/name: homeassistant
    app.kubernetes.io/part-of: homeassistant
spec:
  itemPath: vaults/Collective/items/Home Assistant
