#
# Syncs 1Password item → Secret "adguard" in this namespace.
# Field labels in 1Password must be exactly: USERNAMES, PASSWORDS
# https://developer.1password.com/docs/k8s/operator
#
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: adguard
  namespace: adguard
  labels:
    app.kubernetes.io/component: secrets
    app.kubernetes.io/name: adguard
    app.kubernetes.io/part-of: adguard
spec:
  # Replace with your vault and item title (or UUIDs).
  itemPath: vaults/Collective/items/AdGuard
