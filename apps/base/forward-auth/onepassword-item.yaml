#
# Syncs 1Password item → Secret "traefik-forward-auth" in kube-system.
# Field labels in 1Password must be exactly: client-id, client-secret, secret
# https://developer.1password.com/docs/k8s/operator
#
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: traefik-forward-auth
  namespace: kube-system
  labels:
    app.kubernetes.io/component: secrets
    app.kubernetes.io/name: traefik-forward-auth
    app.kubernetes.io/part-of: traefik-forward-auth
spec:
  itemPath: vaults/Collective/items/Forward Auth
