apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Unrestricted: flux-system (gotk policies), cnpg-system, onepassword (cross-ns API clients).
# kube-system: CIS ingress policies in manifests/kube-system.yaml.

resources:
  - manifests/standard.yaml
  - manifests/cnpg.yaml
  - manifests/open-ingress.yaml
  - manifests/kube-system.yaml
