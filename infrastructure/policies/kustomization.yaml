apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# System namespaces (kube-system, flux-system, cert-manager, cnpg-system, onepassword,
# reflector, reloader) intentionally have no policies — API webhooks, DNS, and operators need broader reach.

resources:
  - manifests/standard.yaml
  - manifests/cnpg.yaml
  - manifests/open-ingress.yaml
