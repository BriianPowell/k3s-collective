apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Unrestricted: flux-system (gotk policies), cnpg-system, onepassword (cross-ns API clients).
# kube-system: CIS ingress policies in manifests/kube-system.yaml.

resources:
  - manifests/cnpg-egress.yaml
  - manifests/cnpg-ingress.yaml
  - manifests/kube-system.yaml
  - manifests/media-limitrange.yaml
  - manifests/open-egress.yaml
  - manifests/open-ingress.yaml
  - manifests/permissive-egress.yaml
  - manifests/standard-egress.yaml
  - manifests/standard-ingress.yaml
