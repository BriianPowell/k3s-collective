# LoadBalancer DNS, game ports, and WAN clients are not from a Kubernetes namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-all-ingress
  namespace: adguard
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - {}
