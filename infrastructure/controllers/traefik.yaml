#
# Reference:
# https://artifacthub.io/packages/helm/traefik/traefik/30.0.1
#

apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: kube-system
  labels:
    app.kubernetes.io/component: helm-repository
    app.kubernetes.io/name: traefik
spec:
  interval: 24h
  url: https://traefik.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: kube-system
  labels:
    app.kubernetes.io/component: helm-release
    app.kubernetes.io/name: traefik
spec:
  interval: 1h0m0s
  maxHistory: 3
  timeout: 10m0s
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: kube-system
      version: '>=30.0.0 <33.0.0'
  values:
    commonLabels:
      app.kubernetes.io/part-of: traefik
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    deployment:
      revisionHistoryLimit: 3
      # k3s klipper-lb + externalTrafficPolicy: Local requires a pod on every node
      # that receives external traffic, otherwise svclb SNATs and backends see pod IPs.
      kind: DaemonSet
      annotations:
        secret.reloader.stakater.com/auto: 'true'
        # Explicit: restart when reflected CrowdSec bouncer cert rotates in kube-system
        secret.reloader.stakater.com/reload: crowdsec-bouncer-tls
      labels:
        app.kubernetes.io/component: deployment
      podLabels:
        app.kubernetes.io/component: pod
    priorityClassName: system-cluster-critical
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
    service:
      labels:
        app.kubernetes.io/component: service
      ipFamilyPolicy: PreferDualStack
      spec:
        # Preserve client source IP to the Traefik pod (default Cluster SNATs to node IP)
        externalTrafficPolicy: Local
    ports:
      web:
        redirectTo:
          port: websecure
        forwardedHeaders:
          insecure: true
          trustedIPs:
            - 127.0.0.1/32
            - 10.0.0.0/16
            - 10.42.0.0/16
            - 10.43.0.0/16
      plex:
        # Plex Media Server LAN (IngressRouteTCP → media/plex-media-server). Do not forward :32400 on WAN.
        port: 32400
        expose:
          default: true
        exposedPort: 32400
        protocol: TCP
      mqtt:
        # Plain MQTT for LAN (ESP8266, etc.) via IngressRouteTCP → Mosquitto. Do not forward :1883 on WAN.
        port: 1883
        expose:
          default: true
        exposedPort: 1883
        protocol: TCP
      mqtts:
        # Public MQTT over TLS (IngressRouteTCP → Mosquitto). Forward WAN 8883 to Traefik LB.
        port: 8883
        expose:
          default: true
        exposedPort: 8883
        protocol: TCP
      websecure:
        middlewares:
          - kube-system-crowdsec-bouncer@kubernetescrd
        tls:
          options: default
        forwardedHeaders:
          insecure: true
          trustedIPs:
            # LAN / cluster: trust X-Forwarded-* from upstream proxies on these nets
            - 127.0.0.1/32
            - 10.0.0.0/16
            - 10.42.0.0/16
            - 10.43.0.0/16
        proxyProtocol:
          insecure: true
          trustedIPs:
            # - 0.0.0.0/0 # for testing, will allow all IPS
            - 127.0.0.1/32 # localhost
            - 10.0.0.0/16 # local subnet
            - 10.42.0.0/16 # k3s pod CIDR
            - 10.43.0.0/16 # k3s service CIDR
    logs:
      general:
        level: DEBUG
      access:
        enabled: true
        fields:
          headers:
            defaultmode: keep
    providers:
      kubernetesCRD:
        enabled: true
        allowCrossNamespace: true # Use Middlewares across namespaces
      kubernetesIngress:
        enabled: true
        publishedService:
          enabled: true
    ingressRoute:
      dashboard:
        enabled: false
    experimental:
      plugins:
        crowdsec-bouncer:
          moduleName: github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
          version: v1.4.6
    volumes:
      - name: crowdsec-bouncer-tls
        mountPath: /etc/traefik/crowdsec-certs/
        type: secret
    tlsOptions:
      default:
        minVersion: VersionTLS12
        sniStrict: false
        cipherSuites:
          - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
          - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
          - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
          - TLS_AES_128_GCM_SHA256
          - TLS_AES_256_GCM_SHA384
          - TLS_CHACHA20_POLY1305_SHA256
        curvePreferences:
          - CurveP521
          - CurveP384
    tlsStore:
      default:
        defaultCertificate:
          secretName: wildcard-powell-place
    securityContext:
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
    podSecurityContext:
      fsGroup: 65532
    resources:
      requests:
        cpu: 10m
        memory: 50Mi
      limits:
        cpu: 300m
        memory: 150Mi
