#
# 1Password Connect + Kubernetes Operator
# https://developer.1password.com/docs/k8s/operator/?deployment-type=helm
# https://github.com/1Password/connect-helm-charts
#
# Bootstrap (once, before or right after this release reconciles):
#
#   kubectl -n onepassword create secret generic op-credentials \
#     --from-file=1password-credentials.json=./1password-credentials.json
#
#   kubectl -n onepassword create secret generic onepassword-token \
#     --from-literal=token="$(op connect token create k3s-operator --server <server> --vault <vault>)"
#
# Create the Connect server + credentials: https://developer.1password.com/docs/connect/get-started/
#

apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: onepassword
  namespace: onepassword
  labels:
    app.kubernetes.io/component: helm-repository
    app.kubernetes.io/name: onepassword
spec:
  interval: 24h
  url: https://1password.github.io/connect-helm-charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: onepassword-connect
  namespace: onepassword
  labels:
    app.kubernetes.io/component: helm-release
    app.kubernetes.io/name: onepassword-connect
spec:
  interval: 1h0m0s
  timeout: 10m0s
  chart:
    spec:
      chart: connect
      sourceRef:
        kind: HelmRepository
        name: onepassword
        namespace: onepassword
      version: '>=2.4.0 <3.0.0'
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    connect:
      create: true
      credentialsName: op-credentials
      credentialsKey: 1password-credentials.json
      nodeSelector:
        kubernetes.io/hostname: abaddon
      api:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 256Mi
      sync:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 256Mi
    operator:
      create: true
      authMethod: connect
      autoRestart: true
      pollingInterval: 600
      token:
        name: onepassword-token
        key: token
      nodeSelector:
        kubernetes.io/hostname: abaddon
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 256Mi
