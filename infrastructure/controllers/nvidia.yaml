#
# Reference:
# https://nixos.wiki/wiki/K3s#Nvidia_support
# https://docs.k3s.io/advanced#nvidia-container-runtime-support
# https://github.com/NVIDIA/k8s-device-plugin?tab=readme-ov-file#updating-per-node-configuration-with-a-node-label
#

apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: nvidia
  namespace: kube-system
  labels:
    app.kubernetes.io/component: helm-repository
    app.kubernetes.io/name: nvidia
spec:
  interval: 24h
  url: https://nvidia.github.io/k8s-device-plugin
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvidia-device-plugin
  namespace: kube-system
  labels:
    app.kubernetes.io/component: helm-release
    app.kubernetes.io/name: nvidia-device-plugin
spec:
  interval: 1h0m0s
  maxHistory: 3
  chart:
    spec:
      chart: nvidia-device-plugin
      sourceRef:
        kind: HelmRepository
        name: nvidia
        namespace: kube-system
      version: '>=0.15.0 <1.0.0'
  values:
    # Required for the chart to hostPath-mount driver libs at /driver-root in the plugin pod.
    # Setting this only in config.map does NOT create the volume (see helm daemonset template).
    nvidiaDriverRoot: /run/opengl-driver
    config:
      default: default
      map:
        default: |-
          version: v1
          flags:
            migStrategy: 'none'
            failOnInitError: true
            nvidiaDriverRoot: /run/opengl-driver
            plugin:
              passDeviceSpecs: false
              # envvar works with NixOS + nvidia-container-runtime; cdi-annotations needs
              # ld.so.cache and versioned libs under /driver-root that NixOS does not provide.
              deviceListStrategy:
                - envvar
              deviceIDStrategy: uuid
    nfd:
      enabled: false
    gdsEnabled: false
    mofedEnabled: false
    compatWithCPUManager: false
    allowDefaultNamespace: false
    runtimeClassName: nvidia
    nodeSelector:
      kubernetes.io/hostname: sheol
    gfd:
      enabled: false
---
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: nvidia
  labels:
    app.kubernetes.io/component: gpu-plugin
    nvidia.com/gpu: rtx-3080
handler: nvidia
