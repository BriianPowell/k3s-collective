apiVersion: v1
kind: Namespace
metadata:
  name: kube-system
  labels:
    app.kubernetes.io/component: system
    # k3s klipper-lb (svclb) needs NET_ADMIN, hostPort, and sysctls for ServiceLB ports (e.g. Traefik :1883).
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
