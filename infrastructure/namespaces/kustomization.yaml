apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - adguard.yaml
  - atuin.yaml
  - cert-manager.yaml
  - cnpg-system.yaml
  - crowdsec.yaml
  - flux-system.yaml
  - homeassistant.yaml
  - keycloak.yaml
  - kube-system.yaml
  - media.yaml
  - minecraft.yaml
  - monitoring.yaml
  - nextcloud.yaml
  - onepassword.yaml
  - reflector.yaml
  - reloader.yaml
  - valheim.yaml
  - v-rising.yaml
  - wiki-js.yaml

# enforce is set per Namespace manifest (privileged vs baseline). A global enforce label
# here overwrites Namespace CR labels because cluster-scoped objects ignore namespaceSelectors.
labels:
  - includeSelectors: false
    includeTemplates: false
    pairs:
      pod-security.kubernetes.io/warn: restricted
      pod-security.kubernetes.io/warn-version: latest
      pod-security.kubernetes.io/audit: restricted
      pod-security.kubernetes.io/audit-version: latest
