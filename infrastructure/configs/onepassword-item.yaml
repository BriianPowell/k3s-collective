#
# Syncs 1Password item → Secret "cloudflare-api-token" in cert-manager.
# Field label in 1Password must be exactly: api-token
# https://developer.1password.com/docs/k8s/operator
#
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
  labels:
    app.kubernetes.io/component: secrets
    app.kubernetes.io/name: cloudflare-api-token
    app.kubernetes.io/part-of: cert-manager
spec:
  itemPath: vaults/Collective/items/Cloudflare
